server:
  port: 8080
  env: dev

database:
  dsn: "postgres://postgres:root123@localhost:5432/wukong_ai_db?sslmode=disable"

# ── LLM 配置（dev：主用 Ollama 本地，降级到 DeepSeek）────────────────────────
llm:
  provider: ollama
  api_key: ""
  base_url: "http://localhost:11434"
  model: "qwen3:4b"
  embedding_model: ""
  embedding_dim: 0
  max_rpm: 0
  max_tpm: 0

  # 开发环境降级链（Ollama 挂了降到 DeepSeek）
  fallbacks:
    - provider: deepseek
      api_key: ""
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_rpm: 0
      max_tpm: 0

  circuit_breaker:
    threshold: 3    # 开发环境更快触发熔断（方便测试）
    timeout: 30s

agent:
  max_workers: 4
  max_sub_agents: 4
  default_timeout: 300s
  retry_count: 3
  stale_job_timeout: 60s

sandbox:
  base_dir: "./sandbox"
  python_repl_enabled: true
  bash_enabled: true

tools:
  search:
    tavily_api_key: ""
    duckduckgo_enabled: true
  file:
    allowed_paths:
      - "./tasks"
      - "./prompts"

memory:
  short_term_max_messages: 50
  long_term_top_k: 5

prompts:
  dir: "./prompts"
